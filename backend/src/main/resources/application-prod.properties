# ══════════════════════════════════════════════════════════
# DealerOS — Production profile (Render / Railway / Fly.io)
# Activated by: SPRING_PROFILES_ACTIVE=prod
# ══════════════════════════════════════════════════════════

# ── H2 in-memory (no filesystem dependency on cloud) ─────
spring.datasource.url=jdbc:h2:mem:dealeros;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop

# ── H2 console disabled in prod ──────────────────────────
spring.h2.console.enabled=false

# ── Logging quieter ──────────────────────────────────────
logging.level.com.dealeros=WARN
logging.level.org.hibernate.SQL=WARN
