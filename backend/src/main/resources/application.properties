# ══════════════════════════════════════════════════════════
# DealerOS — Application Configuration
# Local Mac server — no login required
# ══════════════════════════════════════════════════════════

spring.application.name=DealerOS

# ── Server ────────────────────────────────────────────────
server.port=8080

# ── H2 Database (file-mode, persists between restarts) ────
# DB file will be created at: dealership-management/data/dealeros.mv.db
spring.datasource.url=jdbc:h2:file:./data/dealeros;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# update = safe auto-migration (adds new columns, never drops)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── H2 Console (accessible at http://localhost:8080/h2-console) ──
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# ── Jackson (Java 8 date/time) ────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── File upload ───────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ── DealerOS paths ────────────────────────────────────────
# Base folder for all vehicle/investor files
dealeros.files.base-path=./files

# Path to the Master Excel spreadsheet for import/export
dealeros.excel.path=../Master_Spreadsheet_TRIAL_sanitised.xlsx

# ── Static resources ─────────────────────────────────────
# classpath:/static/ contains frontend/ bundled into JAR by maven-resources-plugin
# file:../frontend/ is a dev-time override so edits are picked up without rebuild
spring.web.resources.static-locations=file:../frontend/,classpath:/static/

# ── Port (overridden by $PORT env var on Render/Railway) ─
server.port=${PORT:8080}

# ── Logging ───────────────────────────────────────────────
logging.level.com.dealeros=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
